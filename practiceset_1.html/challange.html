<!-- write a code to  give students grade acoording to there marks -->




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body><script>

var name = prompt('write your name: ');

var marks = Number(prompt('good morning ' +name+ ' enter how much total marks you got. to know your  grade'));



if (marks >= 90 && marks <= 100) {
    document.body.innerHTML = "<h1>You got A grade</h1>";
}
else if (marks >= 80 && marks < 90) {
    document.body.innerHTML = "<h1>You got B grade</h1>";
}
else if (marks >= 70 && marks < 80) {
    document.body.innerHTML = "<h1>You got C grade</h1>";
}
else if (marks >= 60 && marks < 70) {
    document.body.innerHTML = "<h1>You got D grade</h1>";
}
else if (marks >= 0 && marks < 60) {
    document.body.innerHTML = "<h1>You failed</h1>";
}
else {
    document.body.innerHTML = "<h1>Invalid marks entered</h1>";
}


</script>
    
</body>
</html>
